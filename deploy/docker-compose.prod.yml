# Breeze RMM - Production Deployment (US + EU)
#
# Identical on both droplets. Region-specific values come from .env.
# See deploy/.env.example for required variables.
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d
#
# Production images are intentionally immutable. Set the *_IMAGE_DIGEST values
# to sha256 digests produced by the release pipeline, and set third-party
# *_IMAGE_REF values to digest-pinned image references.

x-healthcheck-defaults: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3

services:
  binaries-init:
    image: ghcr.io/lanternops/breeze/binaries@${BREEZE_BINARIES_IMAGE_DIGEST:?Set BREEZE_BINARIES_IMAGE_DIGEST to the release image digest}
    pull_policy: always
    container_name: breeze-binaries-init
    volumes:
      - binaries:/target
    restart: "no"

  caddy:
    image: ${CADDY_IMAGE_REF:?Set CADDY_IMAGE_REF to a digest-pinned Caddy image}
    container_name: breeze-caddy
    restart: unless-stopped
    environment:
      CADDY_TRUSTED_PROXIES: "${CADDY_TRUSTED_PROXIES:-172.30.0.10/32}"
      CADDY_CLIENT_IP_HEADERS: "${CADDY_CLIENT_IP_HEADERS:-CF-Connecting-IP X-Forwarded-For}"
    volumes:
      - ../docker/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ['CMD', 'caddy', 'version']
      start_period: 20s
    networks:
      breeze:
        ipv4_address: ${BREEZE_CADDY_IP:-172.30.0.11}

  tunnel:
    image: ${CLOUDFLARED_IMAGE_REF:?Set CLOUDFLARED_IMAGE_REF to a digest-pinned cloudflared image}
    container_name: breeze-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - /opt/breeze/cloudflared:/etc/cloudflared:ro
    depends_on:
      caddy:
        condition: service_healthy
    networks:
      breeze:
        ipv4_address: ${BREEZE_CLOUDFLARED_IP:-172.30.0.10}

  api:
    image: ghcr.io/lanternops/breeze/api@${BREEZE_API_IMAGE_DIGEST:?Set BREEZE_API_IMAGE_DIGEST to the release image digest}
    platform: linux/amd64
    container_name: breeze-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      DATABASE_URL_APP: ${DATABASE_URL_APP:-}
      BREEZE_APP_DB_PASSWORD: ${BREEZE_APP_DB_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      AGENT_ENROLLMENT_SECRET: ${AGENT_ENROLLMENT_SECRET:?Set AGENT_ENROLLMENT_SECRET in .env}
      BREEZE_BOOTSTRAP_ADMIN_EMAIL: ${BREEZE_BOOTSTRAP_ADMIN_EMAIL:-}
      BREEZE_BOOTSTRAP_ADMIN_PASSWORD: ${BREEZE_BOOTSTRAP_ADMIN_PASSWORD:-}
      BREEZE_BOOTSTRAP_ADMIN_NAME: ${BREEZE_BOOTSTRAP_ADMIN_NAME:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${BREEZE_DOMAIN}}
      PUBLIC_APP_URL: https://${BREEZE_DOMAIN}
      DASHBOARD_URL: https://${BREEZE_DOMAIN}
      PUBLIC_API_URL: https://${BREEZE_DOMAIN}
      API_URL: ${API_URL:-}
      FORCE_HTTPS: ${FORCE_HTTPS:-true}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY in .env}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:?Set MFA_ENCRYPTION_KEY in .env}
      ENROLLMENT_KEY_PEPPER: ${ENROLLMENT_KEY_PEPPER:?Set ENROLLMENT_KEY_PEPPER in .env}
      MFA_RECOVERY_CODE_PEPPER: ${MFA_RECOVERY_CODE_PEPPER:?Set MFA_RECOVERY_CODE_PEPPER in .env}
      TRANSFER_STORAGE_PATH: /data/transfers
      PATCH_REPORT_STORAGE_PATH: /data/patch-reports
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_JSON: "true"
      METRICS_SCRAPE_TOKEN: ${METRICS_SCRAPE_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      ENABLE_REGISTRATION: ${ENABLE_REGISTRATION:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-auto}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@2breeze.app}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      APP_VERSION: ${BREEZE_VERSION:?Set BREEZE_VERSION in .env}
      BREEZE_VERSION: ${BREEZE_VERSION:?Set BREEZE_VERSION in .env}
      BINARY_SOURCE: github
      RELEASE_ARTIFACT_MANIFEST_PUBLIC_KEYS: ${RELEASE_ARTIFACT_MANIFEST_PUBLIC_KEYS:?Set RELEASE_ARTIFACT_MANIFEST_PUBLIC_KEYS in .env}
      # Hosted SaaS gate (#570). This template is for hosted deploys, so
      # IS_HOSTED is required-explicit — operators must set it in .env.
      # Misconfiguration here silently drops new partners to status='active'
      # and bypasses the email-verification flow.
      IS_HOSTED: ${IS_HOSTED:?Set IS_HOSTED in .env (true for hosted SaaS, false for self-hosted)}
      AGENT_BINARY_DIR: /data/binaries/agent
      VIEWER_BINARY_DIR: /data/binaries/viewer
      HELPER_BINARY_DIR: /data/binaries/helper
      BINARY_VERSION_FILE: /data/binaries/VERSION
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_PRESIGN_TTL: ${S3_PRESIGN_TTL:-900}
      TURN_HOST: ${TURN_HOST:-}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-600}
      TRUST_PROXY_HEADERS: "true"
      TRUSTED_PROXY_CIDRS: "${TRUSTED_PROXY_CIDRS:-172.30.0.11/32}"
      PARTNER_HOOKS_URL: http://billing:3002/hooks
      BILLING_SERVICE_URL: http://billing:3002
      BILLING_SERVICE_API_KEY: ${BILLING_SERVICE_API_KEY:-}
      MSI_SIGNING_URL: ${MSI_SIGNING_URL:-}
      MSI_SIGNING_CF_ACCESS_ID: ${MSI_SIGNING_CF_ACCESS_ID:-}
      MSI_SIGNING_CF_ACCESS_SECRET: ${MSI_SIGNING_CF_ACCESS_SECRET:-}
    volumes:
      - api_data:/data
      - binaries:/data/binaries:ro
    secrets:
      - redis_password
    depends_on:
      binaries-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      start_period: 40s
    networks:
      - breeze

  web:
    image: ghcr.io/lanternops/breeze/web@${BREEZE_WEB_IMAGE_DIGEST:?Set BREEZE_WEB_IMAGE_DIGEST to the release image digest}
    platform: linux/amd64
    container_name: breeze-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_API_URL: https://${BREEZE_DOMAIN}
      PUBLIC_BILLING_URL: https://${BREEZE_DOMAIN}
      PUBLIC_ENABLE_REGISTRATION: ${PUBLIC_ENABLE_REGISTRATION:-false}
      PUBLIC_SENTRY_DSN_WEB: ${PUBLIC_SENTRY_DSN_WEB:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4321/']
      start_period: 30s
    networks:
      - breeze

  billing:
    image: ${BILLING_IMAGE_REF:?Set BILLING_IMAGE_REF to a digest-pinned billing image}
    container_name: breeze-billing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BILLING_PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-}
      STRIPE_COMMUNITY_PRICE_ID: ${STRIPE_COMMUNITY_PRICE_ID:-}
      BILLING_API_KEY: ${BILLING_SERVICE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-billing@2breeze.app}
      APP_BASE_URL: https://${BREEZE_DOMAIN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3002/health']
      start_period: 20s
    networks:
      - breeze

  redis:
    image: ${REDIS_IMAGE_REF:?Set REDIS_IMAGE_REF to a digest-pinned Redis image}
    container_name: breeze-redis
    restart: unless-stopped
    command: >
      sh -ec 'password="$$(cat /run/secrets/redis_password)";
      umask 077;
      printf "%s\n" "appendonly yes" "maxmemory ${REDIS_MAXMEMORY:-256mb}" "maxmemory-policy noeviction" "maxclients 10000" "requirepass $$password" > /tmp/redis.conf;
      exec redis-server /tmp/redis.conf'
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck
      test:
        [
          'CMD-SHELL',
          'password="$$(cat /run/secrets/redis_password)"; { printf "AUTH %s\r\n" "$$password"; printf "PING\r\n"; } | redis-cli --no-auth-warning | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - breeze

  # TURN relay for WebRTC remote desktop. Opt-in via: docker compose --profile turn up -d
  coturn:
    image: ${COTURN_IMAGE_REF:?Set COTURN_IMAGE_REF to a digest-pinned coturn image}
    container_name: breeze-coturn
    restart: unless-stopped
    profiles:
      - turn
    network_mode: host
    command: >
      turnserver
      --listening-port=3478
      --tls-listening-port=5349
      --fingerprint
      --use-auth-secret
      --relay-threads=4
      --user-quota=4
      --total-quota=1000
      --max-bps=${TURN_MAX_BPS:-5000000}
      --no-multicast-peers
      --denied-peer-ip=0.0.0.0-0.255.255.255
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=100.64.0.0-100.127.255.255
      --denied-peer-ip=127.0.0.0-127.255.255.255
      --denied-peer-ip=169.254.0.0-169.254.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --denied-peer-ip=192.0.0.0-192.0.0.255
      --denied-peer-ip=192.168.0.0-192.168.255.255
      --denied-peer-ip=198.18.0.0-198.19.255.255
      --denied-peer-ip=224.0.0.0-239.255.255.255
      --denied-peer-ip=240.0.0.0-255.255.255.255
      --denied-peer-ip=::1
      --denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
      --denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
      --denied-peer-ip=ff00::-ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
      --log-file=stdout
      --verbose
      --min-port=49152
      --max-port=65535
      --no-cli
      --static-auth-secret=${TURN_SECRET:-}
      --realm=${TURN_REALM:-breeze.local}
      --external-ip=${TURN_HOST:-}

networks:
  breeze:
    name: breeze
    ipam:
      config:
        - subnet: ${BREEZE_DOCKER_SUBNET:-172.30.0.0/24}

volumes:
  binaries:
  caddy_data:
  caddy_config:
  api_data:
  redis_data:

secrets:
  redis_password:
    environment: REDIS_PASSWORD

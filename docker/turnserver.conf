# Breeze RMM - TURN Server Configuration
# Used for WebRTC remote desktop connections

listening-port=3478
tls-listening-port=5349

# Use fingerprint in TURN messages
fingerprint

# Use coturn TURN REST API time-limited credentials.
# use-auth-secret enables lt-cred-mech internally and validates usernames of
# the form "<unix-expiry>:<scope>" with static-auth-secret.
use-auth-secret

# Realm
realm=breeze.local

# The static auth secret (overridden by docker-compose env var)
# static-auth-secret is set via command line in docker-compose.yml

# Total relay threads
relay-threads=4

# Allocation quotas
user-quota=4
total-quota=1000

# Bandwidth and peer abuse guardrails
max-bps=5000000
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=ff00::-ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Logging
log-file=stdout
verbose

# Relay port range (bounds UDP relay ports for firewall rules)
min-port=49152
max-port=65535

# Disable CLI
no-cli

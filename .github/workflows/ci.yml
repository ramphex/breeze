name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'apps/docs/**'
      - '**/*.md'
      - '**/*.mdx'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.4'
  GO_VERSION: '1.25.10'

# SR-007: least-privilege default. CI runs on every PR (including forks) and
# only needs to read the repo. Any job needing more must opt in per-job.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard production compose defaults
        run: |
          if [ -e docker-compose.override.yml ]; then
            echo "docker-compose.override.yml must not be tracked or present in CI; Compose auto-loads it for production defaults."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check for schema drift
        working-directory: apps/api
        continue-on-error: true
        run: pnpm db:check-drift

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit --project apps/api/tsconfig.json

      - name: Run Astro check
        working-directory: apps/web
        run: pnpm exec astro check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm test --filter=@breeze/api

  # Real-Postgres apply of every migration against an empty database.
  # Catches ordering bugs (issue #506) and any SQL error the static
  # autoMigrate.test.ts cannot see. Cheap (~1 min) and blocking on PRs.
  check-migrations:
    name: Check Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: breeze
          POSTGRES_PASSWORD: breeze
          POSTGRES_DB: breeze
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U breeze"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://breeze:breeze@localhost:5432/breeze
      POSTGRES_PASSWORD: breeze
      # Seed runs at the end of autoMigrate when users is empty.
      # Provide non-secret CI values so it doesn't bail on missing env.
      JWT_SECRET: ci-check-migrations-jwt-secret-not-used-in-prod
      APP_ENCRYPTION_KEY: ci-check-migrations-app-key-32bytes-padding
      MFA_ENCRYPTION_KEY: ci-check-migrations-mfa-key-32bytes-padding
      AGENT_ENROLLMENT_SECRET: ci-check-migrations-agent-enrollment-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations against empty Postgres
        run: pnpm --filter @breeze/api run check:migrations

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm test --filter=@breeze/web

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Production dependency audit. We scope to `--prod` so devDependencies
      # (vitest, eslint, etc.) don't gate releases. We gate at `critical`
      # because `pnpm audit` does NOT support workspace-level filtering and
      # `apps/mobile` is NOT in the customer launch artifact yet — its dev
      # tooling currently pulls in `ip@<=2.0.1` (HIGH GHSA-2p57-rm9w-gvfp,
      # no upstream patch) via `@react-native-community/cli-doctor`. Raising
      # the gate to `high` here would block every PR until mobile is removed
      # or that transitive is replaced.
      #
      # Follow-up to flip to `high`:
      #   1. Decide if mobile ships, then either fix the chain (upstream is
      #      stuck — likely a fork or relocate mobile out of the workspace)
      #      OR drop apps/mobile.
      #   2. Confirm `pnpm audit --prod --audit-level=high` exits 0.
      #   3. Bump this gate.
      #
      # Until then: the other pnpm.overrides (brace-expansion, qs, ws) still
      # close the non-mobile moderate advisories.
      - name: Run npm audit (prod deps, critical only)
        run: pnpm audit --prod --audit-level=critical

      - name: Run supply-chain hardening guard
        run: bash scripts/security/check-supply-chain-hardening.sh

      - name: Run relay/edge hardening guard
        run: bash scripts/security/check-relay-edge-hardening.sh

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@breeze/api

      - name: Verify expected dist artefacts exist
        # tsup config defines named entries — a regression to a single
        # entry would silently drop dist/scripts/recover-stuck-agents.cjs
        # (the runbook target), and a typo there could move dist/index.cjs
        # off the path the production Dockerfile CMDs at. Fail loudly.
        run: |
          test -f apps/api/dist/index.cjs || { echo "missing apps/api/dist/index.cjs"; exit 1; }
          test -f apps/api/dist/scripts/recover-stuck-agents.cjs || { echo "missing apps/api/dist/scripts/recover-stuck-agents.cjs"; exit 1; }
          echo "Both expected dist artefacts present"

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build --filter=@breeze/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
            cgo: '0'
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            suffix: ''
            cgo: '0'
            runner: ubuntu-latest
          - goos: darwin
            goarch: arm64
            suffix: ''
            cgo: '1'
            runner: macos-latest
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            cgo: '0'
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Build Agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ github.sha }}
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-agent-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-agent

      # Windows-only: build a GUI-subsystem sibling from the SAME source so the
      # scheduled task that launches the user-helper at logon does not allocate
      # a visible console window. Same Go source, only the -H windowsgui linker
      # flag differs. See agent/Makefile (build-windows-user-helper) for the
      # local-dev equivalent.
      - name: Build user-helper (Windows only)
        if: matrix.goos == 'windows'
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ github.sha }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION} -H windowsgui" \
            -o "breeze-user-helper-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-agent

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 7

      - name: Upload user-helper artifact (Windows only)
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: breeze-user-helper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-user-helper-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 7

  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Run Go tests
        working-directory: agent
        run: CGO_ENABLED=0 go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: agent-coverage
          path: agent/coverage.out
          retention-days: 7

  # ─── Smoke Test ───────────────────────────────────────────────────────
  # Builds Docker images, starts the full stack, and verifies:
  #   1. DB + Redis connectivity (health/ready)
  #   2. Login + JWT issuance
  #   3. Authenticated API endpoints (exercises core DB tables)
  #   4. Web page loads (SSR rendering works)
  # Non-blocking on PRs (continue-on-error), required on main pushes.
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          BREEZE_VERSION=ci-smoke
          POSTGRES_PASSWORD=smoketest
          REDIS_PASSWORD=ci-smoke-redis-pw
          JWT_SECRET=ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          AGENT_ENROLLMENT_SECRET=ci-smoke-agent-enrollment-Hy4Bz9Mp2Wq6Tv0Lk3
          BREEZE_BOOTSTRAP_ADMIN_EMAIL=ci-admin@breeze.local
          BREEZE_BOOTSTRAP_ADMIN_PASSWORD=ci-smoke-bootstrap-credential-32-chars
          APP_ENCRYPTION_KEY=e9367714341ea19491ff7cd095d1a97e15ae3f7962416723ecfb29a89ed71eb9
          MFA_ENCRYPTION_KEY=e86f8b88f2c058d428de55c4abec1b50a3cd960a7205dffdb65be8130abbb777
          ENROLLMENT_KEY_PEPPER=ci-smoke-enrollment-pepper-Hy4Bz9Mp2Wq6Tv0Lk3
          MFA_RECOVERY_CODE_PEPPER=ci-smoke-mfa-recovery-pepper-Nq8Zx2Vm5Tr9Lp1
          BREEZE_DOMAIN=localhost
          ACME_EMAIL=ci@breeze.local
          TURN_SECRET=ci-smoke-turn-secret
          TURN_HOST=127.0.0.1
          TRUST_PROXY_HEADERS=false
          # Image refs — base docker-compose.yml requires these via ${VAR:?...}.
          # The CI override builds api/web from source and disables caddy/coturn,
          # but Compose still parses interpolation in the base file before
          # profile filtering, so all refs must resolve. Mutable tags are fine
          # here since this stack is ephemeral (torn down in Teardown step).
          BREEZE_API_IMAGE_REF=ghcr.io/lanternops/breeze/api:latest
          BREEZE_WEB_IMAGE_REF=ghcr.io/lanternops/breeze/web:latest
          BREEZE_BINARIES_IMAGE_REF=ghcr.io/lanternops/breeze/binaries:latest
          CADDY_IMAGE_REF=caddy:2-alpine
          POSTGRES_IMAGE_REF=postgres:16-alpine
          REDIS_IMAGE_REF=redis:7-alpine
          COTURN_IMAGE_REF=coturn/coturn:latest
          # Required in production by config/validate.ts (#625) — without
          # this, agents would accept unsigned release manifests. CI uses
          # the well-known test pubkey from ci-smoke-binary-source-*.yml.
          RELEASE_ARTIFACT_MANIFEST_PUBLIC_KEYS=yzx8ftmcls6uBetFC5SYnZhBo+cbur3IX50TbBthTso=
          # Required in production by config/validate.ts (#570) — distinguishes
          # hosted SaaS from self-hosted, gates the email-verification flow on
          # /auth/register-partner. CI runs in self-hosted mode.
          IS_HOSTED=false
          EOF

      - name: Build and start containers
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml.ci up --build -d

      - name: Wait for API ready (DB + Redis)
        run: |
          echo "Waiting for API readiness (DB + Redis)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3001/health/ready 2>/dev/null; do sleep 2; done'
          curl -s http://localhost:3001/health/ready | jq .
          echo "API is ready."

      - name: Wait for Web health
        run: |
          echo "Waiting for Web on :4321..."
          timeout 120 bash -c 'until curl -sf http://localhost:4321/ 2>/dev/null; do sleep 2; done'
          echo "Web is healthy."

      - name: Login and export token
        id: login
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3001/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci-admin@breeze.local","password":"ci-smoke-bootstrap-credential-32-chars"}')
          TOKEN=$(echo "${RESPONSE}" | jq -r '.tokens.accessToken // .token // .accessToken // empty')
          if [ -z "${TOKEN}" ]; then
            echo "Login failed — no token in response"
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Login successful."

      - name: Smoke test API endpoints
        env:
          TOKEN: ${{ steps.login.outputs.token }}
          API: http://localhost:3001/api/v1
        run: |
          FAIL=0
          PASS_COUNT=0
          FAIL_COUNT=0
          smoke() {
            local name=$1 url=$2 expected_status=${3:-200}
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${TOKEN}" "${url}")
            if [ "${STATUS}" = "${expected_status}" ]; then
              echo "  PASS  ${name} (${STATUS})"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              echo "  FAIL  ${name} — expected ${expected_status}, got ${STATUS}"
              FAIL=1
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          }

          echo "=== API Endpoint Smoke Tests ==="

          # ── Devices & Hardware ──
          smoke "GET /devices"                  "${API}/devices"
          smoke "GET /device-groups"            "${API}/device-groups"
          smoke "GET /tags"                     "${API}/tags"
          smoke "GET /custom-fields"            "${API}/custom-fields"
          smoke "GET /filters"                  "${API}/filters"

          # ── Monitoring & Alerts ──
          smoke "GET /alerts"                   "${API}/alerts"
          smoke "GET /monitors"                 "${API}/monitors"

          # ── Organizations & Users ──
          smoke "GET /orgs"                     "${API}/orgs"
          smoke "GET /users"                    "${API}/users"
          smoke "GET /roles"                    "${API}/roles"
          smoke "GET /api-keys"                 "${API}/api-keys"
          smoke "GET /enrollment-keys"          "${API}/enrollment-keys"

          # ── Scripts & Automation ──
          smoke "GET /scripts"                  "${API}/scripts"
          smoke "GET /automations"              "${API}/automations"
          smoke "GET /playbooks"                "${API}/playbooks"

          # ── Patching & Policies ──
          smoke "GET /patches"                  "${API}/patches"
          smoke "GET /patch-policies"           "${API}/patch-policies"
          smoke "GET /update-rings"             "${API}/update-rings"
          smoke "GET /policies"                 "${API}/policies"
          smoke "GET /configuration-policies"   "${API}/configuration-policies"

          # ── Software & Inventory ──
          smoke "GET /software-policies"        "${API}/software-policies"
          smoke "GET /software-inventory"       "${API}/software-inventory"

          # ── Security & Compliance ──
          smoke "GET /audit-logs"               "${API}/audit-logs"
          smoke "GET /audit-baselines"          "${API}/audit-baselines"
          smoke "GET /access-reviews"           "${API}/access-reviews"
          smoke "GET /reliability"              "${API}/reliability"

          # ── Network ──
          smoke "GET /network/baselines"        "${API}/network/baselines"
          smoke "GET /network/changes"          "${API}/network/changes"

          # ── Deployment & Webhooks ──
          smoke "GET /deployments"              "${API}/deployments"
          smoke "GET /webhooks"                 "${API}/webhooks"

          # ── Reports & Notifications ──
          smoke "GET /reports"                  "${API}/reports"
          smoke "GET /notifications"            "${API}/notifications"
          smoke "GET /changes"                  "${API}/changes"

          echo ""
          echo "Results: ${PASS_COUNT} passed, ${FAIL_COUNT} failed"
          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more API smoke tests failed"
            exit 1
          fi
          echo "All API smoke tests passed."

      - name: Smoke test web pages
        run: |
          FAIL=0
          smoke_page() {
            local name=$1 path=$2
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:4321${path}")
            if [ "${STATUS}" = "200" ]; then
              echo "  PASS  ${name} (${STATUS})"
            else
              echo "  FAIL  ${name} — expected 200, got ${STATUS}"
              FAIL=1
            fi
          }

          echo "=== Web Page Smoke Tests ==="

          smoke_page "Dashboard"     "/"
          smoke_page "Login"         "/login"
          smoke_page "Devices"       "/devices"
          smoke_page "Alerts"        "/alerts"
          smoke_page "Scripts"       "/scripts"
          smoke_page "Automations"   "/automations"
          smoke_page "Patches"       "/patches"
          smoke_page "Policies"      "/policies"
          smoke_page "Discovery"     "/discovery"
          smoke_page "Reports"       "/reports"
          smoke_page "Settings"      "/settings"

          if [ "${FAIL}" -ne 0 ]; then
            echo "One or more page smoke tests failed"
            exit 1
          fi
          echo "All page smoke tests passed."

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Integration tests need their own Postgres/Redis on :5433/:6380 — they
      # run TRUNCATE CASCADE on beforeEach, so `assertTestDatabase` refuses to
      # touch the production stack's `breeze` DB on :5432. Spin up the
      # ephemeral test stack alongside the running production stack.
      - name: Start test-stack containers for integration tests
        run: |
          docker compose -f docker-compose.test.yml up -d
          timeout 60 bash -c 'until docker exec breeze-postgres-test pg_isready -U breeze_test -d breeze_test; do sleep 1; done'
          timeout 60 bash -c 'until docker exec breeze-redis-test redis-cli ping | grep -q PONG; do sleep 1; done'

      - name: Run integration tests
        env:
          # Point at the ephemeral test stack, not the running production
          # stack on :5432. DATABASE_URL_APP is the unprivileged role the
          # integration tests actually hit (set up by autoMigrate's
          # ensureAppRole on first run); DATABASE_URL is the superuser used
          # for seeding + verification reads. See apps/api/src/__tests__/
          # integration/loadEnv.ts for the full contract.
          DATABASE_URL: postgresql://breeze_test:breeze_test@localhost:5433/breeze_test
          DATABASE_URL_APP: postgresql://breeze_app:breeze_test@localhost:5433/breeze_test
          BREEZE_APP_DB_PASSWORD: breeze_test
          POSTGRES_PASSWORD: breeze_test
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          APP_ENCRYPTION_KEY: ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY: ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          NODE_ENV: test
        run: pnpm --filter=@breeze/api test:integration

      # The rls-coverage contract test inspects pg_catalog to verify every
      # tenant-scoped table has policies covering SELECT/INSERT/UPDATE/DELETE
      # via the right access helper. Runs against the same test DB AFTER
      # the integration suite (which has already triggered autoMigrate).
      # Has its own runner because vitest.integration.config.ts excludes it:
      # the read-only catalog inspection must not be hooked to setup.ts,
      # which TRUNCATEs core tables on beforeEach.
      - name: Run RLS coverage contract test
        env:
          DATABASE_URL: postgresql://breeze_test:breeze_test@localhost:5433/breeze_test
          DATABASE_URL_APP: postgresql://breeze_app:breeze_test@localhost:5433/breeze_test
          BREEZE_APP_DB_PASSWORD: breeze_test
          POSTGRES_PASSWORD: breeze_test
          JWT_SECRET: ci-smoke-k7x9Qm4pR2vL8nW5jT3yF6hB0cA1dE4gI7
          APP_ENCRYPTION_KEY: ci-smoke-Xz9Lm3Kp7Wn2Qr5Tv8Yb0Hd4Fg6Jc1Ae3
          MFA_ENCRYPTION_KEY: ci-smoke-Nm4Rp8Ws2Kv6Tq0Yh3Bd7Fg1Jc5Le9Ax2
          NODE_ENV: test
        run: pnpm --filter=@breeze/api test:rls-coverage

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== production stack logs ==="
          docker compose -f docker-compose.yml -f docker-compose.override.yml.ci logs --tail=200 || true
          echo "=== test stack logs ==="
          docker compose -f docker-compose.test.yml logs --tail=200 || true

      - name: Teardown
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml.ci down -v || true
          docker compose -f docker-compose.test.yml down -v || true

  # Summary job that depends on all other jobs for branch protection
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-api, test-web, security-audit, build-api, build-web, build-agent, test-agent, smoke-test]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_API_RESULT: ${{ needs.test-api.result }}
          TEST_WEB_RESULT: ${{ needs.test-web.result }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
          BUILD_API_RESULT: ${{ needs.build-api.result }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          BUILD_AGENT_RESULT: ${{ needs.build-agent.result }}
          TEST_AGENT_RESULT: ${{ needs.test-agent.result }}
          SMOKE_TEST_RESULT: ${{ needs.smoke-test.result }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [[ "${LINT_RESULT}" != "success" ]] || \
             [[ "${TYPECHECK_RESULT}" != "success" ]] || \
             [[ "${TEST_API_RESULT}" != "success" ]] || \
             [[ "${TEST_WEB_RESULT}" != "success" ]] || \
             [[ "${SECURITY_AUDIT_RESULT}" != "success" ]] || \
             [[ "${BUILD_API_RESULT}" != "success" ]] || \
             [[ "${BUILD_WEB_RESULT}" != "success" ]] || \
             [[ "${BUILD_AGENT_RESULT}" != "success" ]] || \
             [[ "${TEST_AGENT_RESULT}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          # Smoke test: non-blocking on PRs, required on main
          if [[ "${IS_PR}" != "true" ]] && [[ "${SMOKE_TEST_RESULT}" != "success" ]]; then
            echo "Smoke test failed on main branch push"
            exit 1
          fi
          echo "All required jobs passed!"

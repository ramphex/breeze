name: Dev Web Image - OS Version

on:
  push:
    branches:
      - test/os-version-web-image
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-web-image:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:fix-os-version-test
            ghcr.io/${{ github.repository }}/web:fix-os-version-${{ github.sha }}
          build-args: |
            PUBLIC_APP_VERSION=0.70.0-os-version-test
            PUBLIC_ENABLE_REGISTRATION=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

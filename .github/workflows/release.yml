        with:
          workspaces: apps/helper/src-tauri -> target

      - name: Add macOS universal target
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into helper config
        shell: bash
        working-directory: apps/helper
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Strip prerelease suffix for WiX/Tauri/Cargo compatibility (e.g. 0.11.3-rc.1 → 0.11.3)
          MSI_VERSION="${BUILD_VERSION%%-*}"
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          sed -i.bak 's/^version = "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/version = "'"$MSI_VERSION"'"/' src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' package.json && rm package.json.bak
          echo "Injected version $MSI_VERSION into helper config files (from $BUILD_VERSION)"

      - name: Build Tauri app
        working-directory: apps/helper
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Find and rename artifact
        shell: bash
        working-directory: apps/helper
        run: |
          asset=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "ERROR: No DMG found"
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$asset" breeze-helper-macos.dmg

      - name: Notarize and staple DMG
        shell: bash
        working-directory: apps/helper

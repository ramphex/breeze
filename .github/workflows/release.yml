name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Build artifacts only (no GitHub release)'
        type: boolean
        default: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.4'
  GO_VERSION: '1.25.10'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build --filter=@breeze/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 30

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: web-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Web
        env:
          PUBLIC_APP_VERSION: ${{ steps.web-version.outputs.version }}
        run: pnpm build --filter=@breeze/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 30

  build-agent:
    name: Build Agent
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
            cgo: '0'
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            suffix: ''
            cgo: '1'
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            suffix: ''
            cgo: '1'
            runner: macos-latest
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            cgo: '0'
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        run: go mod download

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          # Allow weak-linking ScreenCaptureKit so the binary runs on macOS 12+
          # where SCK doesn't exist (prevents dyld Symbol not found crash)
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-agent-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-agent

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

      - name: Build breeze-backup
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-backup-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-backup

      - name: Upload breeze-backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-backup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-backup-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

      - name: Build breeze-watchdog
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-watchdog-${GOOS}-${GOARCH}${{ matrix.suffix }}" \
            ./cmd/breeze-watchdog

      - name: Upload breeze-watchdog artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-watchdog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-watchdog-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 30

      - name: Build breeze-desktop-helper
        if: matrix.goos == 'darwin'
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          CGO_LDFLAGS_ALLOW: '-weak_framework|ScreenCaptureKit'
        run: |
          go build -ldflags="-s -w -X main.version=${BUILD_VERSION}" \
            -o "breeze-desktop-helper-${GOOS}-${GOARCH}" \
            ./cmd/breeze-desktop-helper

      - name: Upload breeze-desktop-helper artifact
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v7
        with:
          name: breeze-desktop-helper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/breeze-desktop-helper-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  build-windows-msi:
    name: Build + Sign Windows Artifacts
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: windows-latest
    needs: [build-agent]
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ contains(github.ref_name, '-') && 'signing-prerelease' || 'signing-production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Download Go dependencies
        working-directory: agent
        shell: pwsh
        run: go mod download

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool update --global wix | Out-Null
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix | Out-Null
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          wix eula accept wix7

      - name: Get version from tag
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME.Substring(1)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows resources and binary
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Fail-fast: a non-terminating PowerShell error (e.g. a missing
          # toolchain) otherwise lets a later `go build` proceed against
          # stale or missing resources, and a non-zero `go build` exit code
          # is silently ignored unless we check $LASTEXITCODE — that
          # combination shipped a release once where the agent .exe was
          # absent from dist\ and the installer step packaged whatever was
          # left from a previous run.
          $ErrorActionPreference = "Stop"
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          go install github.com/tc-hib/go-winres@v0.3.3
          Push-Location agent\resources
          & "$env:USERPROFILE\go\bin\go-winres.exe" make --in winres.json --out ..\cmd\breeze-agent\rsrc_windows_amd64.syso
          Pop-Location
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\breeze-agent-windows-amd64.exe .\cmd\breeze-agent
          if ($LASTEXITCODE -ne 0) { throw "go build breeze-agent failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build breeze-backup
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\breeze-backup-windows-amd64.exe .\cmd\breeze-backup
          if ($LASTEXITCODE -ne 0) { throw "go build breeze-backup failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build breeze-watchdog
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION" -o ..\dist\breeze-watchdog-windows-amd64.exe .\cmd\breeze-watchdog
          if ($LASTEXITCODE -ne 0) { throw "go build breeze-watchdog failed with exit code $LASTEXITCODE" }
          Pop-Location
          # Build breeze-user-helper (GUI-subsystem sibling of breeze-agent).
          # Same Go source as breeze-agent, only the -H windowsgui linker flag
          # differs. Required by the AgentUserHelper scheduled task and the
          # SYSTEM-context sessionbroker spawn paths so the user-helper does
          # not surface a console window in the interactive session.
          Push-Location agent
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=$env:BUILD_VERSION -H windowsgui" -o ..\dist\breeze-user-helper-windows-amd64.exe .\cmd\breeze-agent
          if ($LASTEXITCODE -ne 0) { throw "go build breeze-user-helper failed with exit code $LASTEXITCODE" }
          Pop-Location

      - name: Validate signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERT_PROFILE_PROD: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          AZURE_CERT_PROFILE_PRERELEASE: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
        run: |
          $required = @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SIGNING_ENDPOINT", "AZURE_SIGNING_ACCOUNT_NAME")
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Missing required signing secret: $name"
            }
          }

          $isPrerelease = "${{ contains(github.ref_name, '-') }}" -eq "true"
          if ($isPrerelease) {
            if ([string]::IsNullOrWhiteSpace($env:AZURE_CERT_PROFILE_PRERELEASE)) {
              throw "Missing required signing secret: AZURE_CERT_PROFILE_PRERELEASE"
            }
          } else {
            if ([string]::IsNullOrWhiteSpace($env:AZURE_CERT_PROFILE_PROD)) {
              throw "Missing required signing secret: AZURE_CERT_PROFILE_PROD"
            }
          }

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign Windows EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\breeze-agent-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\breeze-agent-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign backup EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\breeze-backup-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign backup EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\breeze-backup-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign watchdog executable (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\breeze-watchdog-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign watchdog executable (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\breeze-watchdog-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign user-helper EXE (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\breeze-user-helper-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign user-helper EXE (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\breeze-user-helper-windows-amd64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build MSI
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          $version = "${{ steps.version.outputs.version }}"
          $agentExe = Join-Path $root "dist\breeze-agent-windows-amd64.exe"
          $backupExe = Join-Path $root "dist\breeze-backup-windows-amd64.exe"
          $watchdogExe = Join-Path $root "dist\breeze-watchdog-windows-amd64.exe"
          $userHelperExe = Join-Path $root "dist\breeze-user-helper-windows-amd64.exe"
          $msiPath = Join-Path $root "dist\breeze-agent.msi"
          & (Join-Path $root "agent\installer\build-msi.ps1") -Version $version -AgentExePath $agentExe -BackupExePath $backupExe -WatchdogExePath $watchdogExe -UserHelperExePath $userHelperExe -OutputPath $msiPath

      - name: Build Template MSI
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          $version = "${{ steps.version.outputs.version }}"
          $agentExe = Join-Path $root "dist\breeze-agent-windows-amd64.exe"
          $backupExe = Join-Path $root "dist\breeze-backup-windows-amd64.exe"
          $watchdogExe = Join-Path $root "dist\breeze-watchdog-windows-amd64.exe"
          $userHelperExe = Join-Path $root "dist\breeze-user-helper-windows-amd64.exe"
          $msiPath = Join-Path $root "dist\breeze-agent-template.msi"
          & (Join-Path $root "agent\installer\build-msi.ps1") -Version $version -AgentExePath $agentExe -BackupExePath $backupExe -WatchdogExePath $watchdogExe -UserHelperExePath $userHelperExe -OutputPath $msiPath -Template

      # Only sign the regular MSI — template MSI is re-signed server-side by jsign after patching
      - name: Sign MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}\dist\breeze-agent.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}\dist\breeze-agent.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        shell: pwsh
        run: |
          $targets = @(
            (Join-Path $env:GITHUB_WORKSPACE "dist\breeze-agent-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\breeze-backup-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\breeze-watchdog-windows-amd64.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "dist\breeze-agent.msi")
          )
          foreach ($target in $targets) {
            $sig = Get-AuthenticodeSignature -FilePath $target
            # Valid = fully trusted chain; UnknownError = signed but Azure Trusted
            # Signing root cert not yet in local trust store (normal for new accounts)
            if ($sig.Status -ne "Valid" -and $sig.Status -ne "UnknownError") {
              throw "Signature validation failed for $target. Status: $($sig.Status)"
            }
            if ($sig.Status -eq "UnknownError") {
              Write-Host "::warning::$target signed but root cert not yet trusted locally (Status: UnknownError). This is normal for new Azure Trusted Signing accounts."
            }
            Write-Host "Verified: $target - Status: $($sig.Status) - Signer: $($sig.SignerCertificate.Subject)"
          }

      - name: Upload signed Windows EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-windows-amd64
          path: dist/breeze-agent-windows-amd64.exe
          overwrite: true
          retention-days: 30

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-windows-msi
          path: dist/breeze-agent.msi
          retention-days: 30

      - name: Upload Template MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-template-msi
          path: dist/breeze-agent-template.msi
          retention-days: 30

      - name: Upload signed backup EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-backup-windows-amd64
          path: dist/breeze-backup-windows-amd64.exe
          overwrite: true
          retention-days: 30

      - name: Upload signed watchdog EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-watchdog-windows-amd64
          path: dist/breeze-watchdog-windows-amd64.exe
          overwrite: true
          retention-days: 30

  build-macos-agent:
    name: Sign macOS Agent Binary
    runs-on: macos-latest
    needs: [build-agent]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download darwin/amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-agent-darwin-amd64
          path: staging/

      - name: Download darwin/arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-agent-darwin-arm64
          path: staging/

      - name: Download backup darwin/amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-backup-darwin-amd64
          path: staging/

      - name: Download backup darwin/arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-backup-darwin-arm64
          path: staging/

      - name: Download desktop-helper darwin/amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-desktop-helper-darwin-amd64
          path: staging/

      - name: Download desktop-helper darwin/arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-desktop-helper-darwin-arm64
          path: staging/

      - name: Download watchdog darwin/amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-watchdog-darwin-amd64
          path: staging/

      - name: Download watchdog darwin/arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: breeze-watchdog-darwin-arm64
          path: staging/

      - name: Import certificate into keychain
        if: vars.ENABLE_MACOS_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_PATH"

      - name: Sign binaries
        if: vars.ENABLE_MACOS_SIGNING == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for bin in staging/breeze-agent-darwin-* staging/breeze-backup-darwin-* staging/breeze-desktop-helper-darwin-* staging/breeze-watchdog-darwin-*; do
            [ -f "$bin" ] || continue
            codesign --force --options runtime \
              --entitlements agent/entitlements/agent-macos.entitlements.plist \
              --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$bin"
            codesign --verify --verbose "$bin"
            echo "Signed: $bin"
          done

      - name: Notarize binaries
        if: vars.ENABLE_MACOS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for bin in staging/breeze-agent-darwin-* staging/breeze-backup-darwin-* staging/breeze-desktop-helper-darwin-* staging/breeze-watchdog-darwin-*; do
            [ -f "$bin" ] || continue
            case "$bin" in *.pkg|*.zip) continue ;; esac
            ZIP_PATH="${bin}.zip"
            ditto -c -k --keepParent "$bin" "$ZIP_PATH"

            scripts/release/notarize-submit.sh "$ZIP_PATH"

            rm -f "$ZIP_PATH"
          done

      - name: Upload signed darwin/amd64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-darwin-amd64
          path: staging/breeze-agent-darwin-amd64
          overwrite: true
          retention-days: 30

      - name: Upload signed darwin/arm64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-darwin-arm64
          path: staging/breeze-agent-darwin-arm64
          overwrite: true
          retention-days: 30

      - name: Upload signed backup darwin/amd64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-backup-darwin-amd64
          path: staging/breeze-backup-darwin-amd64
          overwrite: true
          retention-days: 30

      - name: Upload signed backup darwin/arm64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-backup-darwin-arm64
          path: staging/breeze-backup-darwin-arm64
          overwrite: true
          retention-days: 30

      - name: Upload signed desktop-helper darwin/amd64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-desktop-helper-darwin-amd64
          path: staging/breeze-desktop-helper-darwin-amd64
          overwrite: true
          retention-days: 30

      - name: Upload signed desktop-helper darwin/arm64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-desktop-helper-darwin-arm64
          path: staging/breeze-desktop-helper-darwin-arm64
          overwrite: true
          retention-days: 30

      - name: Upload signed watchdog darwin/amd64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-watchdog-darwin-amd64
          path: staging/breeze-watchdog-darwin-amd64
          overwrite: true
          retention-days: 30

      - name: Upload signed watchdog darwin/arm64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-watchdog-darwin-arm64
          path: staging/breeze-watchdog-darwin-arm64
          overwrite: true
          retention-days: 30

      - name: Build macOS .pkg installers
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${BUILD_VERSION#v}"
          chmod +x agent/installer/macos/build-pkg.sh
          for arch in amd64 arm64; do
            agent/installer/macos/build-pkg.sh \
              "staging/breeze-agent-darwin-${arch}" \
              "staging/breeze-desktop-helper-darwin-${arch}" \
              "staging/breeze-backup-darwin-${arch}" \
              "staging/breeze-watchdog-darwin-${arch}" \
              "$VERSION" \
              "$arch" \
              "staging/breeze-agent-darwin-${arch}.pkg"
          done

      - name: Sign .pkg installers
        if: vars.ENABLE_MACOS_SIGNING == 'true'
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          if [ -z "$APPLE_INSTALLER_IDENTITY" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::APPLE_INSTALLER_IDENTITY required for tag releases (productsign would silently skip, shipping unsigned .pkgs that fail downstream Installer.app notarization)"
              exit 1
            fi
            echo "APPLE_INSTALLER_IDENTITY not set, skipping .pkg signing (non-tag build)"
            exit 0
          fi
          for pkg in staging/*.pkg; do
            SIGNED="${pkg%.pkg}-signed.pkg"
            productsign --sign "$APPLE_INSTALLER_IDENTITY" "$pkg" "$SIGNED"
            mv "$SIGNED" "$pkg"
            echo "Signed: $(basename "$pkg")"
          done

      - name: Notarize and staple .pkg installers
        if: vars.ENABLE_MACOS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          if [ -z "$APPLE_INSTALLER_IDENTITY" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::APPLE_INSTALLER_IDENTITY required for tag releases (.pkgs would skip notarization and fail downstream Installer.app notarization)"
              exit 1
            fi
            echo "APPLE_INSTALLER_IDENTITY not set, skipping .pkg notarization (non-tag build)"
            exit 0
          fi
          for pkg in staging/*.pkg; do
            scripts/release/notarize-submit.sh "$pkg"
            xcrun stapler staple "$pkg"
            xcrun stapler validate "$pkg"
            echo "Notarized and stapled: $(basename "$pkg")"
          done

      - name: Verify macOS signatures and notarization
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ "${{ vars.ENABLE_MACOS_SIGNING }}" != "true" ]; then
            echo "::error::ENABLE_MACOS_SIGNING must be true for tag releases."
            exit 1
          fi

          # Raw Mach-O binaries: verify signature + hardened runtime + Developer ID.
          # Do NOT run `spctl -a -t exec` against raw command-line binaries — Gatekeeper's
          # exec assessment is bundle-aware and rejects raw Mach-O with "the code is valid
          # but does not seem to be an app", even when signing/notarization are correct.
          # The user-facing assessment happens at the .pkg layer below (binaries are
          # delivered to end users only inside notarized .pkgs).
          for bin in staging/breeze-agent-darwin-* staging/breeze-backup-darwin-* staging/breeze-desktop-helper-darwin-* staging/breeze-watchdog-darwin-*; do
            [ -f "$bin" ] || continue
            # The prefix glob also matches .pkg / .zip files in staging at this
            # point in the workflow — skip them (.pkg uses productsign, .zip is
            # the notarytool upload artifact). The .pkg loop below verifies them.
            case "$bin" in *.pkg|*.zip) continue ;; esac
            codesign --verify --strict --verbose=2 "$bin"
            DETAILS=$(codesign -dvvv "$bin" 2>&1)
            if ! grep -q 'flags=.*runtime' <<<"$DETAILS"; then
              echo "::error::$bin missing hardened runtime flag"
              echo "$DETAILS"
              exit 1
            fi
            if ! grep -q 'Authority=Developer ID Application' <<<"$DETAILS"; then
              echo "::error::$bin not signed by Developer ID Application"
              echo "$DETAILS"
              exit 1
            fi
          done

          for pkg in staging/*.pkg; do
            [ -f "$pkg" ] || continue
            pkgutil --check-signature "$pkg"
            xcrun stapler validate "$pkg"
            spctl -a -vv -t install "$pkg"
          done

      - name: Upload .pkg darwin/amd64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-darwin-amd64-pkg
          path: staging/breeze-agent-darwin-amd64.pkg
          retention-days: 30

      - name: Upload .pkg darwin/arm64
        uses: actions/upload-artifact@v7
        with:
          name: breeze-agent-darwin-arm64-pkg
          path: staging/breeze-agent-darwin-arm64.pkg
          retention-days: 30

      - name: Cleanup keychain
        if: always() && vars.ENABLE_MACOS_SIGNING == 'true'
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  build-macos-installer-app:
    name: Build macOS Installer App
    needs: [build-macos-agent]
    runs-on: macos-latest
    if: vars.ENABLE_MACOS_SIGNING == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download .pkg darwin/amd64
        uses: actions/download-artifact@v8
        with:
          name: breeze-agent-darwin-amd64-pkg
          path: installer-pkgs/

      - name: Download .pkg darwin/arm64
        uses: actions/download-artifact@v8
        with:
          name: breeze-agent-darwin-arm64-pkg
          path: installer-pkgs/

      - name: Import certificate into keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_PATH"

      - name: Build .app bundle
        run: |
          chmod +x agent/installer/macos-app/build-app-bundle.sh
          agent/installer/macos-app/build-app-bundle.sh \
            --pkg-amd64 installer-pkgs/breeze-agent-darwin-amd64.pkg \
            --pkg-arm64 installer-pkgs/breeze-agent-darwin-arm64.pkg \
            --output "build/Breeze Installer.app"

      - name: Sign .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --entitlements agent/installer/macos-app/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" --timestamp \
            --deep "build/Breeze Installer.app"
          codesign --verify --verbose=2 "build/Breeze Installer.app"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "build/Breeze Installer.app" build/installer-notarize.zip
          scripts/release/notarize-submit.sh build/installer-notarize.zip
          xcrun stapler staple "build/Breeze Installer.app"
          xcrun stapler validate "build/Breeze Installer.app"
          spctl -a -t exec -vv "build/Breeze Installer.app"

      - name: Package for release
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Breeze Installer.app" \
            "build/Breeze Installer.app.zip"
          ls -lh build/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-installer-app
          path: build/Breeze Installer.app.zip
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  build-viewer:
    name: Build Viewer
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: breeze-viewer-windows.msi
            asset_glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: breeze-viewer-linux.AppImage
            asset_glob: 'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/viewer/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into viewer config
        shell: bash
        working-directory: apps/viewer
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Strip prerelease suffix for WiX/Tauri/Cargo compatibility (e.g. 0.11.3-rc.1 → 0.11.3)
          MSI_VERSION="${BUILD_VERSION%%-*}"
          # Update tauri.conf.json — match any semver version string
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update window title to include version
          sed -i.bak 's/"title": "Breeze Remote Desktop"/"title": "Breeze Remote Desktop '"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak 's/^version = "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/version = "'"$MSI_VERSION"'"/' src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          # Update package.json
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' package.json && rm package.json.bak
          echo "Injected version $MSI_VERSION into viewer config files (from $BUILD_VERSION)"

      - name: Validate signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set — update signing will fail"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        working-directory: apps/viewer
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Find and rename artifact
        id: find_asset
        shell: bash
        working-directory: apps/viewer
        run: |
          asset=$(ls ${{ matrix.asset_glob }} 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "ERROR: No asset found matching ${{ matrix.asset_glob }}"
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$asset" "${{ matrix.asset_name }}"
          echo "path=${{ matrix.asset_name }}" >> "$GITHUB_OUTPUT"

      - name: Package updater bundle (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        working-directory: apps/viewer
        run: |
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle/appimage"
          appimage=$(ls "$bundle_dir"/*.AppImage 2>/dev/null | grep -v '\.sig$' | grep -v '\.tar\.gz' | head -1)
          sig_file=$(ls "$bundle_dir"/*.AppImage.sig 2>/dev/null | head -1)
          if [ -z "$appimage" ] || [ -z "$sig_file" ]; then
            echo "ERROR: Updater bundle not found in $bundle_dir"
            ls -la "$bundle_dir" || true
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$appimage" breeze-viewer-linux.AppImage
          cp "$sig_file" breeze-viewer-linux.AppImage.sig

      - name: Upload Viewer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: apps/viewer/${{ matrix.asset_name }}
          retention-days: 30

      - name: Upload Viewer Linux updater bundle
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-linux-updater
          path: |
            apps/viewer/breeze-viewer-linux.AppImage
            apps/viewer/breeze-viewer-linux.AppImage.sig
          retention-days: 30


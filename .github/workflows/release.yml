          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/viewer/src-tauri -> target

      - name: Add macOS universal target
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into viewer config
        shell: bash
        working-directory: apps/viewer
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Strip prerelease suffix for WiX/Tauri/Cargo compatibility (e.g. 0.11.3-rc.1 → 0.11.3)
          MSI_VERSION="${BUILD_VERSION%%-*}"
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' src-tauri/tauri.conf.json && rm src-tauri/tauri.conf.json.bak
          sed -i.bak 's/^version = "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/version = "'"$MSI_VERSION"'"/' src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          sed -i.bak 's/"version": "[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*"/"version": "'"$MSI_VERSION"'"/' package.json && rm package.json.bak
          echo "Injected version $MSI_VERSION into viewer config files (from $BUILD_VERSION)"

      - name: Validate signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set — update signing will fail"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        working-directory: apps/viewer
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Find and rename artifact
        shell: bash
        working-directory: apps/viewer
        run: |
          asset=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "ERROR: No DMG found"
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$asset" breeze-viewer-macos.dmg

      - name: Notarize and staple DMG
        shell: bash
        working-directory: apps/viewer
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          "$GITHUB_WORKSPACE/scripts/release/notarize-submit.sh" breeze-viewer-macos.dmg
          xcrun stapler staple breeze-viewer-macos.dmg
          xcrun stapler validate breeze-viewer-macos.dmg

      - name: Package updater bundle (macOS)
        shell: bash
        working-directory: apps/viewer
        run: |
          bundle_dir="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          tar_gz=$(ls "$bundle_dir"/*.app.tar.gz 2>/dev/null | head -1)
          sig_file=$(ls "$bundle_dir"/*.app.tar.gz.sig 2>/dev/null | head -1)
          if [ -z "$tar_gz" ] || [ -z "$sig_file" ]; then
            echo "ERROR: Updater bundle not found in $bundle_dir"
            ls -la "$bundle_dir" || true
            ls -R src-tauri/target/*/release/bundle/ || true
            exit 1
          fi
          cp "$tar_gz" breeze-viewer-macos.app.tar.gz
          cp "$sig_file" breeze-viewer-macos.app.tar.gz.sig

      - name: Upload Viewer macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-macos.dmg
          path: apps/viewer/breeze-viewer-macos.dmg
          retention-days: 30

      - name: Upload Viewer macOS updater bundle
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-macos-updater
          path: |
            apps/viewer/breeze-viewer-macos.app.tar.gz
            apps/viewer/breeze-viewer-macos.app.tar.gz.sig
          retention-days: 30

  build-helper-macos:
    name: Build Helper (macOS)
    runs-on: macos-latest

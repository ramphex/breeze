  sign-windows-tauri:
    name: Sign Windows Tauri Artifacts
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: windows-latest
    needs: [build-viewer, build-helper]
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ contains(github.ref_name, '-') && 'signing-prerelease' || 'signing-production' }}
    steps:
      - name: Download viewer Windows MSI
        uses: actions/download-artifact@v8
        with:
          name: breeze-viewer-windows.msi
          path: staging/

      - name: Download helper Windows MSI
        uses: actions/download-artifact@v8
        with:
          name: breeze-helper-windows.msi
          path: staging/

      - name: Validate signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
        run: |
          $required = @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SIGNING_ENDPOINT", "AZURE_SIGNING_ACCOUNT_NAME")
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Missing required signing secret: $name"
            }
          }

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign viewer MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}/staging/breeze-viewer-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign viewer MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}/staging/breeze-viewer-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign helper MSI (stable profile)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PROD }}
          files: ${{ github.workspace }}/staging/breeze-helper-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign helper MSI (prerelease profile)
        if: ${{ contains(github.ref_name, '-') }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_PRERELEASE }}
          files: ${{ github.workspace }}/staging/breeze-helper-windows.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        shell: pwsh
        run: |
          $targets = @(
            (Join-Path $env:GITHUB_WORKSPACE "staging\breeze-viewer-windows.msi"),
            (Join-Path $env:GITHUB_WORKSPACE "staging\breeze-helper-windows.msi")
          )
          foreach ($target in $targets) {
            $sig = Get-AuthenticodeSignature -FilePath $target
            if ($sig.Status -ne "Valid" -and $sig.Status -ne "UnknownError") {
              throw "Signature validation failed for $target. Status: $($sig.Status)"
            }
            if ($sig.Status -eq "UnknownError") {
              Write-Host "::warning::$target signed but root cert not yet trusted locally (Status: UnknownError)."
            }
            Write-Host "Verified: $target - Status: $($sig.Status) - Signer: $($sig.SignerCertificate.Subject)"
          }

      - name: Upload signed viewer MSI
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-windows.msi
          path: staging/breeze-viewer-windows.msi
          overwrite: true
          retention-days: 30

      - name: Upload signed helper MSI
        uses: actions/upload-artifact@v7
        with:
          name: breeze-helper-windows.msi
          path: staging/breeze-helper-windows.msi
          overwrite: true
          retention-days: 30

  package-windows-updater:
    name: Package Windows Updater Bundle
    if: vars.ENABLE_WINDOWS_SIGNING == 'true'
    runs-on: ubuntu-latest
    needs: [sign-windows-tauri]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download signed viewer MSI
        uses: actions/download-artifact@v8
        with:
          name: breeze-viewer-windows.msi
          path: staging/

      - name: Create updater zip
        run: |
          set -euo pipefail
          if [ ! -s staging/breeze-viewer-windows.msi ]; then
            echo "::error::Signed MSI missing or empty at staging/breeze-viewer-windows.msi"
            exit 1
          fi
          cd staging
          zip -j breeze-viewer-windows.msi.zip breeze-viewer-windows.msi

      - name: Minisign the zip with Tauri key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          key_file=$(mktemp)
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$key_file"
          unset TAURI_SIGNING_PRIVATE_KEY
          cd apps/viewer
          pnpm exec tauri signer sign -f "$key_file" "$GITHUB_WORKSPACE/staging/breeze-viewer-windows.msi.zip"
          if [ ! -s "$GITHUB_WORKSPACE/staging/breeze-viewer-windows.msi.zip.sig" ]; then
            echo "::error::Tauri signer did not produce .sig file"
            exit 1
          fi

      - name: Upload Windows updater bundle
        uses: actions/upload-artifact@v7
        with:
          name: breeze-viewer-windows-updater
          path: |
            staging/breeze-viewer-windows.msi.zip
            staging/breeze-viewer-windows.msi.zip.sig
          retention-days: 30

  merge-viewer-update-manifest:
    name: Generate Viewer Update Manifest
    runs-on: ubuntu-latest
    needs: [build-viewer, build-viewer-macos, package-windows-updater]
    if: >-
      !cancelled()
      && (needs.build-viewer.result == 'success' || needs.build-viewer.result == 'skipped')
      && (needs.build-viewer-macos.result == 'success' || needs.build-viewer-macos.result == 'skipped')
      && (needs.package-windows-updater.result == 'success' || needs.package-windows-updater.result == 'skipped')
    steps:
      - name: Download viewer updater bundles
        uses: actions/download-artifact@v8
        with:
          path: updater-bundles
          pattern: 'breeze-viewer-*-updater'
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          WIN_UPDATER_RESULT: ${{ needs.package-windows-updater.result }}
        run: |
          # Strip leading "v" and any prerelease suffix so the version matches
          # the one injected into tauri.conf.json at build time.
          version="${REF_NAME#v}"
          version="${version%%-*}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          release_base="${SERVER_URL}/${REPO}/releases/download/${REF_NAME}"
          notes_url="${SERVER_URL}/${REPO}/releases/tag/${REF_NAME}"

          echo "Downloaded updater bundle contents:"
          ls -la updater-bundles/ || true

          platforms='{}'

          # macOS — Tauri builds a universal binary, so the same bundle
          # satisfies both x86_64 and aarch64 clients.
          mac_sig="updater-bundles/breeze-viewer-macos.app.tar.gz.sig"
          if [ -f "$mac_sig" ]; then
            sig_content=$(cat "$mac_sig")
            url="${release_base}/breeze-viewer-macos.app.tar.gz"
            platforms=$(jq -n \
              --arg sig "$sig_content" \
              --arg url "$url" \
              '{"darwin-x86_64": {signature: $sig, url: $url}, "darwin-aarch64": {signature: $sig, url: $url}}')
          else
            echo "::warning::macOS updater signature not found — macOS auto-update disabled for this release"
          fi

          # Linux AppImage
          linux_sig="updater-bundles/breeze-viewer-linux.AppImage.sig"
          if [ -f "$linux_sig" ]; then
            sig_content=$(cat "$linux_sig")
            url="${release_base}/breeze-viewer-linux.AppImage"
            platforms=$(echo "$platforms" | jq \
              --arg sig "$sig_content" \
              --arg url "$url" \
              '. + {"linux-x86_64": {signature: $sig, url: $url}}')
          else
            echo "::warning::Linux updater signature not found — Linux auto-update disabled for this release"
          fi

          # Windows MSI updater bundle
          win_sig="updater-bundles/breeze-viewer-windows.msi.zip.sig"
          if [ -f "$win_sig" ]; then
            sig_content=$(cat "$win_sig")
            url="${release_base}/breeze-viewer-windows.msi.zip"
            platforms=$(echo "$platforms" | jq \
              --arg sig "$sig_content" \
              --arg url "$url" \
              '. + {"windows-x86_64": {signature: $sig, url: $url}}')
          elif [ "$WIN_UPDATER_RESULT" = "success" ]; then
            echo "::error::package-windows-updater reported success but no sig found at $win_sig"
            exit 1
          else
            echo "::warning::Windows updater signature not found (upstream result: $WIN_UPDATER_RESULT) — Windows auto-update disabled for this release"
          fi

          if [ "$(echo "$platforms" | jq 'keys | length')" = "0" ]; then
            echo "::error::No updater platforms available — latest.json would be useless"
            exit 1
          fi

          jq -n \
            --arg version "$version" \
            --arg notes "See release notes at $notes_url" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload generated manifest
        uses: actions/upload-artifact@v7
        with:
          name: viewer-latest-json
          path: latest.json
          retention-days: 30

  release-integrity-gate:
    name: Release Integrity Gate
    runs-on: ubuntu-latest
    needs: [build-windows-msi, build-macos-agent, build-macos-installer-app, sign-windows-tauri, build-viewer-macos, build-helper-macos, package-windows-updater, merge-viewer-update-manifest]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Fail closed when release signing was skipped
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          SKIP_RELEASE: ${{ inputs.skip_release || false }}
          BUILD_WINDOWS_MSI_RESULT: ${{ needs.build-windows-msi.result }}
          BUILD_MACOS_AGENT_RESULT: ${{ needs.build-macos-agent.result }}
          BUILD_MACOS_INSTALLER_APP_RESULT: ${{ needs.build-macos-installer-app.result }}
          SIGN_WINDOWS_TAURI_RESULT: ${{ needs.sign-windows-tauri.result }}
          BUILD_VIEWER_MACOS_RESULT: ${{ needs.build-viewer-macos.result }}
          BUILD_HELPER_MACOS_RESULT: ${{ needs.build-helper-macos.result }}
          PACKAGE_WINDOWS_UPDATER_RESULT: ${{ needs.package-windows-updater.result }}
          MERGE_VIEWER_UPDATE_MANIFEST_RESULT: ${{ needs.merge-viewer-update-manifest.result }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$SKIP_RELEASE" == "true" ]]; then
            echo "Build-only workflow_dispatch run: release signing gate is advisory."
            exit 0
          fi

          failed=0
          require_success() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "::error::$name must succeed for tag release $REF_NAME; got '$result'."
              failed=1
            fi
          }

          require_success "build-windows-msi" "$BUILD_WINDOWS_MSI_RESULT"
          require_success "build-macos-agent" "$BUILD_MACOS_AGENT_RESULT"
          require_success "build-macos-installer-app" "$BUILD_MACOS_INSTALLER_APP_RESULT"
          require_success "sign-windows-tauri" "$SIGN_WINDOWS_TAURI_RESULT"
          require_success "build-viewer-macos" "$BUILD_VIEWER_MACOS_RESULT"
          require_success "build-helper-macos" "$BUILD_HELPER_MACOS_RESULT"
          require_success "package-windows-updater" "$PACKAGE_WINDOWS_UPDATER_RESULT"
          require_success "merge-viewer-update-manifest" "$MERGE_VIEWER_UPDATE_MANIFEST_RESULT"

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi
          echo "All required signing/notarization jobs succeeded for tag release $REF_NAME."

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-agent, build-windows-msi, build-macos-agent, build-macos-installer-app, sign-windows-tauri, build-viewer, build-helper, build-viewer-macos, build-helper-macos, merge-viewer-update-manifest, package-windows-updater, release-integrity-gate]
    if: >-
      !cancelled()
      && needs.build-api.result == 'success'
      && needs.build-web.result == 'success'
      && needs.build-agent.result == 'success'
      && needs.release-integrity-gate.result == 'success'
      && (needs.build-windows-msi.result == 'success' || needs.build-windows-msi.result == 'skipped')
      && (needs.build-macos-agent.result == 'success' || needs.build-macos-agent.result == 'skipped')
      && (needs.build-macos-installer-app.result == 'success' || needs.build-macos-installer-app.result == 'skipped')
      && (needs.sign-windows-tauri.result == 'success' || needs.sign-windows-tauri.result == 'skipped')
      && (needs.package-windows-updater.result == 'success' || needs.package-windows-updater.result == 'skipped')
      && (needs.build-viewer.result == 'success' || needs.build-viewer.result == 'skipped')
      && (needs.build-helper.result == 'success' || needs.build-helper.result == 'skipped')
      && (needs.build-viewer-macos.result == 'success' || needs.build-viewer-macos.result == 'skipped')
      && (needs.build-helper-macos.result == 'success' || needs.build-helper-macos.result == 'skipped')
      && (needs.merge-viewer-update-manifest.result == 'success' || needs.merge-viewer-update-manifest.result == 'skipped')
      && !(github.event_name == 'workflow_dispatch' && inputs.skip_release)
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '{api-dist,web-dist,breeze-agent-*,breeze-backup-*,breeze-desktop-helper-*,breeze-watchdog-*,breeze-viewer-*,breeze-helper-*,breeze-installer-app,viewer-latest-json}'
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy agent binaries
          for dir in artifacts/breeze-agent-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy backup binaries
          for dir in artifacts/breeze-backup-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy desktop-helper binaries
          for dir in artifacts/breeze-desktop-helper-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy watchdog binaries
          for dir in artifacts/breeze-watchdog-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy viewer installers
          for dir in artifacts/breeze-viewer-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy viewer update manifest
          if [ -d "artifacts/viewer-latest-json" ] && [ -f "artifacts/viewer-latest-json/latest.json" ]; then
            cp artifacts/viewer-latest-json/latest.json release-assets/latest.json
          fi

          # Copy helper installers
          for dir in artifacts/breeze-helper-*; do
            if [ -d "$dir" ] && ls "$dir"/* >/dev/null 2>&1; then
              cp "$dir"/* release-assets/
            fi
          done

          # Copy macOS installer app
          if [ -d "artifacts/breeze-installer-app" ] && ls "artifacts/breeze-installer-app/"* >/dev/null 2>&1; then
            cp "artifacts/breeze-installer-app/"* release-assets/
          fi

          # Create archives for API and Web
          if [ -d "artifacts/api-dist" ]; then
            tar -czvf release-assets/breeze-api.tar.gz -C artifacts/api-dist .
          fi

          if [ -d "artifacts/web-dist" ]; then
            tar -czvf release-assets/breeze-web.tar.gz -C artifacts/web-dist .
          fi

          python3 <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          release_dir = Path("release-assets")
          excluded = {
              "checksums.txt",
              "release-artifact-manifest.json",
              "release-artifact-manifest.json.ed25519",
              "release-artifact-manifest.json.minisig",
          }

          # Raw Mach-O agent binaries get Developer ID + notarization but
          # ship to users only inside the .pkg. spctl --assess --type execute
          # is invalid against raw Mach-O, so the trust label is correct
          # even though the end-user verifier differs (.pkg gatekeeper check).
          DARWIN_BINARY_RE = re.compile(
              r"^breeze-(agent|backup|desktop-helper|watchdog)-darwin-(amd64|arm64)$"
          )

          def platform_trust(name):
              # *-template.msi is intentionally unsigned here; per-tenant
              # property injection happens server-side and the resulting
              # MSI is signed there.
              if name.endswith("-template.msi"):
                  return "release-workflow-produced"
              if name.endswith(".msi") or name.endswith(".exe"):
                  return "windows-authenticode-required"
              if (
                  name.endswith(".pkg")
                  or name.endswith(".app.zip")
                  or name.endswith(".dmg")
              ):
                  return "macos-developer-id-notarization-required"
              if DARWIN_BINARY_RE.match(name):
                  return "macos-developer-id-notarization-required"
              return "release-workflow-produced"

          assets = []
          for path in sorted(release_dir.iterdir(), key=lambda item: item.name):
              if not path.is_file() or path.name in excluded:
                  continue
              assets.append({
                  "name": path.name,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  "size": path.stat().st_size,
                  "platformTrust": platform_trust(path.name),
              })

          manifest = {
              "schemaVersion": 1,
              "repository": os.environ["GITHUB_REPOSITORY"],
              "release": os.environ["GITHUB_REF_NAME"],
              "assets": assets,
          }
          (release_dir / "release-artifact-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n"
          )
          PY

      - name: Sign release artifact manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY: ${{ secrets.RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY }}
          RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY: ${{ secrets.RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY }}
          RELEASE_MANIFEST_ED25519_PRIVATE_KEY: ${{ secrets.RELEASE_MANIFEST_ED25519_PRIVATE_KEY }}
          RELEASE_MANIFEST_ED25519_PUBLIC_KEY: ${{ secrets.RELEASE_MANIFEST_ED25519_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY" ] || [ -z "$RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY" ]; then
            echo "::error::RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY and RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY are required for tag releases."
            exit 1
          fi
          if [ -z "$RELEASE_MANIFEST_ED25519_PRIVATE_KEY" ] || [ -z "$RELEASE_MANIFEST_ED25519_PUBLIC_KEY" ]; then
            echo "::error::RELEASE_MANIFEST_ED25519_PRIVATE_KEY and RELEASE_MANIFEST_ED25519_PUBLIC_KEY are required for tag releases."
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y minisign

          key_file="$RUNNER_TEMP/release-manifest.minisign.key"
          printf '%s' "$RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY" > "$key_file"
          unset RELEASE_MANIFEST_MINISIGN_PRIVATE_KEY
          chmod 600 "$key_file"

          minisign -S \
            -s "$key_file" \
            -m release-assets/release-artifact-manifest.json \
            -x release-assets/release-artifact-manifest.json.minisig \
            -t "Breeze release artifact manifest ${GITHUB_REF_NAME}"

          minisign -V \
            -P "$RELEASE_MANIFEST_MINISIGN_PUBLIC_KEY" \
            -m release-assets/release-artifact-manifest.json \
            -x release-assets/release-artifact-manifest.json.minisig

          node <<'NODE'
          const { createPrivateKey, createPublicKey, sign, verify } = require('node:crypto');
          const { readFileSync, writeFileSync } = require('node:fs');

          const spkiPrefix = Buffer.from('302a300506032b6570032100', 'hex');

          function parsePrivateKey(value) {
            const trimmed = value.trim();
            if (trimmed.includes('BEGIN PRIVATE KEY')) {
              return createPrivateKey(trimmed);
            }
            return createPrivateKey({
              key: Buffer.from(trimmed, 'base64'),
              format: 'der',
              type: 'pkcs8',
            });
          }

          function parsePublicKey(value) {
            const trimmed = value.trim();
            if (trimmed.includes('BEGIN PUBLIC KEY')) {
              return createPublicKey(trimmed);
            }
            const decoded = Buffer.from(trimmed, 'base64');
            if (decoded.length === 32) {
              return createPublicKey({
                key: Buffer.concat([spkiPrefix, decoded]),
                format: 'der',
                type: 'spki',
              });
            }
            return createPublicKey({ key: decoded, format: 'der', type: 'spki' });
          }

          const manifest = readFileSync('release-assets/release-artifact-manifest.json');
          const privateKey = parsePrivateKey(process.env.RELEASE_MANIFEST_ED25519_PRIVATE_KEY);
          const publicKey = parsePublicKey(process.env.RELEASE_MANIFEST_ED25519_PUBLIC_KEY);
          const signature = sign(null, manifest, privateKey);
          if (!verify(null, manifest, publicKey, signature)) {
            throw new Error('Ed25519 release manifest signature self-verification failed');
          }
          writeFileSync(
            'release-assets/release-artifact-manifest.json.ed25519',
            `${signature.toString('base64')}\n`,
            { mode: 0o644 }
          );
          NODE

      - name: Generate release checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt

      - name: Verify release asset integrity requirements
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # checksums.txt is verified for existence/non-emptiness but cannot
          # contain a SHA entry for itself: `sha256sum * > checksums.txt`
          # expands the glob before creating the redirection target.
          if [ ! -s "release-assets/checksums.txt" ]; then
            echo "::error::Required asset missing or empty: checksums.txt"
            exit 1
          fi

          # Build the asset list dynamically from release-assets/ to catch
          # partial-upload failures (missing AppImage, DMG, signature, etc.)
          # that a hand-curated list silently allows.
          # ! -name '.*' mirrors `sha256sum *`'s glob (which excludes dotfiles)
          # so the two steps see the same file set. Materialize via a tempfile
          # so a `find` failure propagates under set -e (process substitution
          # exit codes don't reach the parent shell).
          assets_list=$(mktemp)
          trap 'rm -f "$assets_list"' EXIT
          find release-assets -mindepth 1 -maxdepth 1 -type f ! -name '.*' -print0 \
            > "$assets_list"

          asset_count=0
          while IFS= read -r -d '' path; do
            asset=$(basename "$path")
            [ "$asset" = "checksums.txt" ] && continue
            asset_count=$((asset_count + 1))
            if [ ! -s "$path" ]; then
              echo "::error::Required signed/notarized release asset missing or empty: $asset"
              exit 1
            fi
            if ! awk -v asset="$asset" '
              $1 ~ /^[a-f0-9]{64}$/ {
                name=$0
                sub(/^[a-f0-9]{64}[[:space:]]+[*]?/, "", name)
                if (name == asset) found=1
              }
              END { exit found ? 0 : 1 }
            ' release-assets/checksums.txt; then
              echo "::error::checksums.txt missing SHA-256 entry for $asset"
              exit 1
            fi
          done < "$assets_list"

          if [ "$asset_count" -eq 0 ]; then
            echo "::error::No signable artifacts found in release-assets/ (only checksums.txt or empty)"
            exit 1
          fi
          echo "Verified $asset_count release assets against checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync agent versions to Breeze API
        if: ${{ !contains(github.ref_name, '-') && vars.BREEZE_API_URL != '' }}
        env:
          BREEZE_API_URL: ${{ vars.BREEZE_API_URL }}
          BREEZE_API_KEY: ${{ secrets.BREEZE_API_KEY }}
        run: |
          curl -sf -X POST "${BREEZE_API_URL}/api/v1/agent-versions/sync-github" \
            -H "Authorization: Bearer ${BREEZE_API_KEY}" \
            -H "Content-Type: application/json" \
            || echo "::warning::Agent version sync failed (non-fatal)"

  build-binaries-image:
    name: Build & Push Binaries Init Image
    runs-on: ubuntu-latest
    needs: [build-agent, build-windows-msi, build-macos-agent, sign-windows-tauri, build-viewer, build-helper, build-viewer-macos, build-helper-macos, create-release]
    if: >-
      !cancelled()
      && needs.build-agent.result == 'success'
      && (needs.build-windows-msi.result == 'success' || needs.build-windows-msi.result == 'skipped')
      && (needs.build-macos-agent.result == 'success' || needs.build-macos-agent.result == 'skipped')
      && (needs.sign-windows-tauri.result == 'success' || needs.sign-windows-tauri.result == 'skipped')
      && needs.build-viewer.result == 'success'
      && needs.build-helper.result == 'success'
      && (needs.build-viewer-macos.result == 'success' || needs.build-viewer-macos.result == 'skipped')
      && (needs.build-helper-macos.result == 'success' || needs.build-helper-macos.result == 'skipped')
      && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create staging directory
        run: mkdir -p staging/agent staging/viewer staging/helper

      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/agent
          pattern: 'breeze-agent-*'
          merge-multiple: true

      - name: Download viewer artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/viewer
          pattern: 'breeze-viewer-*'
          merge-multiple: true

      - name: Download helper artifacts
        uses: actions/download-artifact@v8
        with:
          path: staging/helper
          pattern: 'breeze-helper-*'
          merge-multiple: true

      - name: Write VERSION file
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "${REF_NAME#v}" > staging/VERSION

      - name: List staging contents
        run: find staging -type f | sort

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/binaries
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha

      - name: Build and push binaries image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: staging/
          file: docker/Dockerfile.binaries
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-docker-api:
    name: Build & Push API Docker Image
    runs-on: ubuntu-latest
    needs: [build-api, create-release]
    if: >-
      !cancelled()
      && needs.build-api.result == 'success'
      && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download API artifact
        uses: actions/download-artifact@v8
        with:
          name: api-dist
          path: apps/api/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-docker-web:
    name: Build & Push Web Docker Image
    runs-on: ubuntu-latest
    needs: [build-web, create-release]
    if: >-
      !cancelled()
      && needs.build-web.result == 'success'
      && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Web artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: apps/web/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=sha

      - name: Build and push Web image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PUBLIC_APP_VERSION=${{ steps.version.outputs.version }}
            PUBLIC_ENABLE_REGISTRATION=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
